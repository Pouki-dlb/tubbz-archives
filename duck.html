<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck details — The TUBBZ Archive</title>
  <link rel="icon" href="images/placeholder.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    /* Thème : pose data-theme sur <html> AVANT le rendu (évite tout flash).
       « auto » (défaut) suit l'OS. Le bouton est géré ensuite par common.js. */
    (function () {
      var pref = "auto";
      try { pref = localStorage.getItem("tubbz-theme") || "auto"; } catch (e) {}
      var dark = pref === "dark" ||
        (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand-block">
        <a class="brand" href="index.html?home">
          <span class="brand-text"><strong>The </strong><strong class="brand-name">TUBB<span class="brand-z">Z</span></strong> <strong>Archive</strong></span>
        </a>
        <p class="tagline">Find the tubbz you deserve</p>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" type="button" class="btn btn-ghost theme-toggle" aria-label="Theme"></button>
        <a class="btn btn-ghost" href="index.html">← Back</a>
      </div>
    </div>
  </header>

  <main class="wrap" id="duck-root" aria-busy="true">
    <p class="loading">Loading…</p>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="muted">Tubbz™ is a trademark of Numskull Designs. This project is an unofficial collection tool.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="common.js"></script>
  <script src="duck.js"></script>
</body>
</html>
