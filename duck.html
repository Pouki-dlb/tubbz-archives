<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck details — The TUBBZ Archive</title>
  <link rel="icon" href="images/placeholder.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    /* Thème : pose data-theme sur <html> AVANT le rendu (évite tout flash).
       « auto » (défaut) suit l'OS. Le bouton est géré ensuite par common.js. */
    (function () {
      var pref = "auto";
      try { pref = localStorage.getItem("tubbz-theme") || "auto"; } catch (e) {}
      var dark = pref === "dark" ||
        (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    })();
  </script>
</head>
<body data-page="duck">
  <!-- Header + footer sont injectés par common.js (renderLayout), selon data-page
       ci-dessus. Ne pas remettre le markup ici : source unique dans common.js. -->
  <header class="site-header" id="site-header"></header>

  <main class="wrap" id="duck-root" aria-busy="true">
    <p class="loading">Loading…</p>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="data.js"></script>
  <script src="common.js"></script>
  <script src="duck.js"></script>
</body>
</html>
